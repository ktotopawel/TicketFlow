$kind: http-request
method: GET
url: '{{base_url}}/api/events'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });
      
      pm.test("Response body is an array", () => {
        const body = pm.response.json();
        pm.expect(body).to.be.an("array");
      });
      
      pm.test("Each event has the expected shape", () => {
        const body = pm.response.json();
        body.forEach((event) => {
          pm.expect(event).to.have.property("id");
          pm.expect(event).to.have.property("name");
          pm.expect(event).to.have.property("description");
          pm.expect(event).to.have.property("startDate");
          pm.expect(event).to.have.property("endDate");
          pm.expect(event).to.have.property("location");
          pm.expect(event).to.have.property("availableTickets");
        });
      });