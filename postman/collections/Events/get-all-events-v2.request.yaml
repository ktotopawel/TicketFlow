$kind: http-request
method: GET
url: '{{base_url}}/api/v2/events'
order: 1100
query:
  - key: page
    value: '1'
  - key: pageSize
    value: '10'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response body contains paginated event data", () => {
        const body = pm.response.json();
        pm.expect(body).to.be.an("object");
        pm.expect(body).to.have.property("items");
        pm.expect(body.items).to.be.an("array");
        pm.expect(body).to.have.property("metadata");
        pm.expect(body).to.have.property("links");
      });

      pm.test("Each event has the expected shape", () => {
        const body = pm.response.json();
        body.items.forEach((event) => {
          pm.expect(event).to.have.property("id");
          pm.expect(event).to.have.property("name");
          pm.expect(event).to.have.property("description");
          pm.expect(event).to.have.property("startDate");
          pm.expect(event).to.have.property("endDate");
          pm.expect(event).to.have.property("location");
          pm.expect(event).to.have.property("availableTickets");
        });
      });
